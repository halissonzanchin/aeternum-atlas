services:
  aeternum-atlas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aeternum-atlas-dev
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - aeternum_atlas_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  aeternum_atlas_node_modules:
